model:
  default: "gemini-3.1-flash-lite"
  provider: "gemini"
  max_tokens: 4096

gateway:
  allow_all_users: true
  platforms:
    line:
      enabled: true
      trigger_words:
        - "小恆恆"
        - "橫隔膜"
        - "小幫手"

display:
  tool_progress: all
  interim_assistant_messages: false
  streaming: false
  platforms:
    line:
      tool_progress: off

memory:
  memory_enabled: true
  user_profile_enabled: true

agent:
  max_turns: 20
  # 關閉不需要的工具集（家庭助理不需要 terminal）
  disabled_toolsets:
    - terminal
    - files
    - code_execution
    - browser

scheduler:
  enabled: true

plugins:
  enabled:
    - aegis
